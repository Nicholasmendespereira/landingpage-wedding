<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Padrinhos | Ianara & Nicholas</title>

    <!-- mesmo CSS -->
    <link rel="stylesheet" href="../css/checkout.css">

    <!-- mesmas fontes -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Montserrat&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Birthstone&family=DM+Serif+Display:ital@0;1&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
</head>

<body>
    <header>
    </header>
    <main>
        <div id="containerHeaderGifts">
            <h2 id="initialsNames">Ianara & Nicholas </h2>
            <div id="containerSearch">
                <div id="iconHome">
                    <a href="../index.html">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -960 960 960" fill="#00245F">
                            <path d="M240-200h120v-240h240v240h120v-360L480-740 240-560v360Zm-80 80v-480l320-240 320 240v480H520v-240h-80v240H160Zm320-350Z"/>
                        </svg>
                    </a>
                </div>
                <div class="search-wrapper">
                    <div class="search-input-container">
                        <svg class="search-icon" viewBox="0 0 24 24">
                            <path d="M21 21l-4.35-4.35m1.85-5.15a7 7 0 11-14 0 7 7 0 0114 0z"
                            stroke="currentColor"
                            stroke-width="2"
                            fill="none"
                            stroke-linecap="round"
                            stroke-linejoin="round"/>
                        </svg>
                        <input 
                            type="text" 
                            id="searchInput" 
                            placeholder="Buscar pelo nome..."
                        />
                    </div>
                    <div class="containerCarShopping">
                        <!-- svg carrinho -->
                            <a href="../pages/checkout.html" id="buttonCarShoppings">
                            <svg class="shoping-car-icon" fill="#00245F" xmlns="http://www.w3.org/2000/svg" viewBox="0 -960 960 960">
                                <path d="M223.5-103.5Q200-127 200-160t23.5-56.5Q247-240 280-240t56.5 23.5Q360-193 360-160t-23.5 56.5Q313-80 280-80t-56.5-23.5Zm400 0Q600-127 600-160t23.5-56.5Q647-240 680-240t56.5 23.5Q760-193 760-160t-23.5 56.5Q713-80 680-80t-56.5-23.5ZM246-720l96 200h280l110-200H246Zm-38-80h590q23 0 35 20.5t1 41.5L692-482q-11 20-29.5 31T622-440H324l-44 80h480v80H280q-45 0-68-39.5t-2-78.5l54-98-144-304H40v-80h130l38 80Z"/>
                            </svg>
                        </a>
                        <h3 id="totalValue"></h3>
                    </div>
                </div>
            </div>
        </div>
        <section class="checkout-container">
            <h2 id="initialsNames">Carrinho dos Sonhos</h2>
            <div>
                <p class="paragraph">
                    Estes são os sonhos que você está <br>
                    ajudando a realizar.
                </p>
            </div>
            <div id="cardItems"></div>
            <div class="checkout-total">
                <span>Resumo do Pedido</span>
                <div class="containerFlex">
                    <span>Items</span>
                    <span>x items</span>
                </div>
                <div class="containerFlex">
                    <span>Total</span>
                    <strong id="cartTotal">R$ 0,00</strong>
                </div>
            </div>
            <button id="finishButton" class="finish-btn">
                Finalizar e Gerar Pagamento
            </button>
        </section>
        <div class="containerButtonAction">
            <a href="../pages/presentes.html" class="buttonsAction">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
                    <path stroke-linecap="round" stroke-linejoin="round" d="m11.25 9-3 3m0 0 3 3m-3-3h7.5M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
                </svg>
            </a>
        </div>
    </main>
    
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            // Fade-in ao carregar
            document.body.classList.add("loaded");
            // Captura todos os links
            document.querySelectorAll("a").forEach(link => {
                link.addEventListener("click", function(e) {

                    // Ignora nova aba
                    if (this.target === "_blank") return;

                    e.preventDefault();
                    const href = this.href;

                    // Aplica fade-out
                    document.body.classList.remove("loaded");
                    document.body.classList.add("fade-out");

                    setTimeout(() => {
                        window.location.href = href;
                    }, 400); // mesmo tempo do CSS
                });
            });
        });
        const container = document.getElementById("cardItems");
        const input = document.getElementById("searchInput");

        function handleLoadCards() {
            let cart = JSON.parse(localStorage.getItem("cart")) || [];
            let totalValueForPayment = 0
            container.innerHTML = "";

            cart.forEach(item => {
                totalValueForPayment += item.price
                container.innerHTML += `
                    <div class="containerCard">
                        <img class="imgCard" src=${item.src_image} alt=${item.img_alt}>
                        <div>
                            <p class="descriptionCard">${item.name}</p>
                            <p class="valueCard">R$ ${String(item.price.toFixed(2)).replace(".", ",")}</p>
                            <p class="descriptionInstallments">em até 3x de R$ ${item.price ? String((item.price / 3).toFixed(2)).replace(".", ",") : '-'}</p>
                            <button class="buttonAddCar" onclick="handleRemoveItem(${item.id})">
                                <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#ff0808f5">
                                    <path d="M280-120q-33 0-56.5-23.5T200-200v-520h-40v-80h200v-40h240v40h200v80h-40v520q0 33-23.5 56.5T680-120H280Zm400-600H280v520h400v-520ZM360-280h80v-360h-80v360Zm160 0h80v-360h-80v360ZM280-720v520-520Z"/>
                                </svg>
                            </button>
                        </div>
                    </div>
                `;
            });
            const divTotal = document.getElementById("cartTotal");
            divTotal.innerHTML = `R$ ${String(totalValueForPayment.toFixed(2)).replace('.', ',')}`
        }
        handleLoadCards()

        function handleRemoveItem(id) {
            let cart = JSON.parse(localStorage.getItem("cart")) || [];
            const updateCart = cart.filter(item => item.id !== id);
            localStorage.setItem("cart", JSON.stringify(updateCart));
            alert("Produto removido do carrinho!");
            handleLoadCards()
        }
    </script>
</body>
</html>
