<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Padrinhos | Ianara & Nicholas</title>

    <!-- mesmo CSS -->
    <link rel="stylesheet" href="../css/presentes.css">

    <!-- mesmas fontes -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Montserrat&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Birthstone&family=DM+Serif+Display:ital@0;1&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
</head>

<body>

    <header>
    </header>

    <main>
        <section>
            <div id="containerSearch">
                <div class="search-wrapper">
                    <div>
                        <svg class="search-icon" viewBox="0 0 24 24">
                            <path d="M21 21l-4.35-4.35m1.85-5.15a7 7 0 11-14 0 7 7 0 0114 0z"
                            stroke="currentColor"
                            stroke-width="2"
                            fill="none"
                            stroke-linecap="round"
                            stroke-linejoin="round"/>
                        </svg>
                    </div>
                    <input 
                        type="text" 
                        id="searchInput" 
                        placeholder="Buscar pelo nome..."
                    />
                </div>
            </div>

            <div>
                <p class="paragraph">
                    Seja bem-vindo ao nosso sonho. <br>
                    Será uma alegria compartilhar este novo capítulo com você e contar com a sua presença.
                </p>
            </div>
            <div id="cardItems">
            </div>
        </section>
        <div class="containerButtonAction">
            <a href="../index.html" class="buttonsAction">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
                    <path stroke-linecap="round" stroke-linejoin="round" d="m11.25 9-3 3m0 0 3 3m-3-3h7.5M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
                </svg>
            </a>
            <a href="../pages/padrinhosPage2.html" class="buttonsAction">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
                    <path stroke-linecap="round" stroke-linejoin="round" d="m12.75 15 3-3m0 0-3-3m3 3h-7.5M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
                </svg>
            </a>
        </div>
    </main>
    
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            // Fade-in ao carregar
            document.body.classList.add("loaded");
            // Captura todos os links
            document.querySelectorAll("a").forEach(link => {
                link.addEventListener("click", function(e) {

                    // Ignora nova aba
                    if (this.target === "_blank") return;

                    e.preventDefault();
                    const href = this.href;

                    // Aplica fade-out
                    document.body.classList.remove("loaded");
                    document.body.classList.add("fade-out");

                    setTimeout(() => {
                        window.location.href = href;
                    }, 400); // mesmo tempo do CSS
                });
            });
        });
        const products = [
            { id: 1, name: "AIRFRYER", price: 276.00, src_image: "../images/items/AIRFRYER.png", img_alt: "" },
            { id: 2, name: "ARMARIO DE COZINHA", price: 276.00, src_image: "../images/items/ARMARIO_DE_COZINHA.png", img_alt: "" },
            { id: 3, name: "BATEDEIRA", price: 276.00, src_image: "../images/items/BATEDEIRA.png", img_alt: "" },
            { id: 4, name: "CHUVEIRO", price: 276.00, src_image: "../images/items/CHUVEIRO.png", img_alt: "" },
            { id: 5, name: "COLCHÃO", price: 276.00, src_image: "../images/items/COLCHÃO.png", img_alt: "" },
            { id: 6, name: "CONJUNTO DE PANELAS", price: 276.00, src_image: "../images/items/CONJUNTO_DE_PANELAS.png", img_alt: "" },
            { id: 7, name: "FERRO DE PASSAR", price: 276.00, src_image: "../images/items/FERRO_DE_PASSAR.png", img_alt: "" },
            { id: 8, name: "FORNO", price: 276.00, src_image: "../images/items/FORNO.png", img_alt: "" },
            { id: 9, name: "GELADEIRA", price: 276.00, src_image: "../images/items/GELADEIRA.png", img_alt: "" },
            { id: 10, name: "GUARDA ROUPAS", price: 276.00, src_image: "../images/items/GUARDA_ROUPAS.png", img_alt: "" },
            { id: 11, name: "KIT TOALHAS", price: 276.00, src_image: "../images/items/KIT_TOALHAS.png", img_alt: "" },
            { id: 12, name: "MESA 6 LUGARES", price: 276.00, src_image: "../images/items/MESA_6_LUGARES.png", img_alt: "" },
            { id: 13, name: "MICROODAS", price: 276.00, src_image: "../images/items/MICROODAS.png", img_alt: "" },
            { id: 14, name: "MULTIPROCESSADOR", price: 276.00, src_image: "../images/items/MULTIPROCESSADOR.png", img_alt: "" },
            { id: 15, name: "PANELA DE PRESSAO", price: 276.00, src_image: "../images/items/PANELA_DE_PRESSAO.png", img_alt: "" },
            { id: 16, name: "TAPETE", price: 276.00, src_image: "../images/items/TAPETE.png", img_alt: "" }
        ];

        function addToCard(id) {
            const product = products.find(p => p.id === id);

            let cart = JSON.parse(localStorage.getItem("cart")) || [];

            cart.push(product);

            localStorage.setItem("cart", JSON.stringify(cart));

            alert("Produto adicionado ao carrinho!");
        }
        const container = document.getElementById("cardItems");
        const input = document.getElementById("searchInput");

        function handleLoadCards(list) {
            container.innerHTML = "";

            list.forEach(item => {
            container.innerHTML += `
                <div class="containerCard">
                    <img class="imgCard" src=${item.src_image} alt=${item.img_alt}>
                    <p class="descriptionCard">${item.name}</p>
                    <p class="valueCard">R$ ${String(item.price.toFixed(2)).replace(".", ",")}</p>
                    <p class="descriptionInstallments">em até 3x de R$ ${item.price ? String((item.price / 3).toFixed(2)).replace(".", ",") : '-'}</p>
                    <button class="buttonAddCar" onclick="addToCard(${item.id})">Adicionar ao Carrinho</button>
                </div>
            `;
            });
        }
        handleLoadCards(products)

        // Função de filtro
        function filterItems(searchValue) {
            const filtered = products.filter(item =>
                item.name.toLowerCase().includes(searchValue.toLowerCase())
            );

            handleLoadCards(filtered);
        }

        // Evento ao digitar
        input.addEventListener("input", (e) => {
        filterItems(e.target.value);
        });

    </script>
</body>
</html>
