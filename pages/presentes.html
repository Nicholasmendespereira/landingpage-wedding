<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Padrinhos | Ianara & Nicholas</title>

    <!-- mesmo CSS -->
    <link rel="stylesheet" href="../css/presentes.css">

    <!-- mesmas fontes -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Montserrat&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Birthstone&family=DM+Serif+Display:ital@0;1&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
</head>

<body>
    <main>
        <section>
            <div id="containerHeaderGifts">
                <h2 id="initialsNames">Ianara & Nicholas </h2>
                <div id="containerSearch">
                    <div id="iconHome">
                        <a href="../index.html">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -960 960 960" fill="#00245F">
                                <path d="M240-200h120v-240h240v240h120v-360L480-740 240-560v360Zm-80 80v-480l320-240 320 240v480H520v-240h-80v240H160Zm320-350Z"/>
                            </svg>
                        </a>
                    </div>
                    <div class="search-wrapper">
                        <div class="search-input-container">
                            <svg class="search-icon" viewBox="0 0 24 24">
                                <path d="M21 21l-4.35-4.35m1.85-5.15a7 7 0 11-14 0 7 7 0 0114 0z"
                                stroke="currentColor"
                                stroke-width="2"
                                fill="none"
                                stroke-linecap="round"
                                stroke-linejoin="round"/>
                            </svg>
                            <input 
                                type="text" 
                                id="searchInput" 
                                placeholder="Buscar pelo nome..."
                            />
                        </div>
                        <div class="containerCarShopping">
                            <!-- svg carrinho -->
                                <a href="../pages/checkout.html" id="buttonCarShoppings">
                                <svg class="shoping-car-icon" fill="#00245F" xmlns="http://www.w3.org/2000/svg" viewBox="0 -960 960 960">
                                    <path d="M223.5-103.5Q200-127 200-160t23.5-56.5Q247-240 280-240t56.5 23.5Q360-193 360-160t-23.5 56.5Q313-80 280-80t-56.5-23.5Zm400 0Q600-127 600-160t23.5-56.5Q647-240 680-240t56.5 23.5Q760-193 760-160t-23.5 56.5Q713-80 680-80t-56.5-23.5ZM246-720l96 200h280l110-200H246Zm-38-80h590q23 0 35 20.5t1 41.5L692-482q-11 20-29.5 31T622-440H324l-44 80h480v80H280q-45 0-68-39.5t-2-78.5l54-98-144-304H40v-80h130l38 80Z"/>
                                </svg>
                            </a>
                            <h3 id="totalValue"></h3>
                        </div>
                    </div>
                </div>
            </div>

            <div>
                <p class="paragraph">
                    Seja bem-vindo ao nosso sonho. <br>
                    Será uma alegria compartilhar este novo capítulo com você e contar com a sua presença.
                </p>
            </div>
            <div id="cardItems">
            </div>
        </section>
        <div class="containerButtonAction">
            <a href="../index.html" class="buttonsAction">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
                    <path stroke-linecap="round" stroke-linejoin="round" d="m11.25 9-3 3m0 0 3 3m-3-3h7.5M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
                </svg>
            </a>
            <a href="../pages/padrinhosPage2.html" class="buttonsAction">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
                    <path stroke-linecap="round" stroke-linejoin="round" d="m12.75 15 3-3m0 0-3-3m3 3h-7.5M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
                </svg>
            </a>
        </div>
    </main>
    
    <script>
        window.addEventListener("scroll", () => {
            const header = document.getElementById("containerHeaderGifts");
            header.classList.toggle("sticky", window.scrollY > 10);
        });

        document.addEventListener("DOMContentLoaded", () => {
            // Fade-in ao carregar
            document.body.classList.add("loaded");
            // Captura todos os links
            document.querySelectorAll("a").forEach(link => {
                link.addEventListener("click", function(e) {

                    // Ignora nova aba
                    if (this.target === "_blank") return;

                    e.preventDefault();
                    const href = this.href;

                    // Aplica fade-out
                    document.body.classList.remove("loaded");
                    document.body.classList.add("fade-out");

                    setTimeout(() => {
                        window.location.href = href;
                    }, 400); // mesmo tempo do CSS
                });
            });
        });
        const products = [
            { id: 1, name: "Geladeira Panasonic BB65 Black Glass Inverse 450L 220V", price: 345.00, src_image: "../images/items/GELADEIRA.png", quantity: 1},
            { id: 2, name: "Fogão 5 Bocas Atlas Preto Mesa de Vidro Mônaco", price: 320.00, src_image: "../images/items/FOGÃO.png", quantity: 1},
            { id: 3, name: "Base e colchão casal Emma Queen 158x198", price: 338.00, src_image: "../images/items/COLCHÃO.png", quantity: 1},
            { id: 4, name: "Guarda Roupa Casal com Espelho e Pés 8 Portas grafite", price: 264.00, src_image: "../images/items/GUARDA_ROUPAS.png", quantity: 1},
            { id: 5, name: "Armário de Cozinha Completo 6 Peças 12 Portas com Torre Quente ", price: 292.00, src_image: "../images/items/ARMARIO_DE_COZINHA.png", quantity: 1},
            { id: 6, name: "Forno Elétrico Dako Supreme 44 Litros Titanium", price: 265.00, src_image: "../images/items/FORNO.png", quantity: 1},
            { id: 7, name: "Micro-ondas LG 30L Preto Solo NeoChef", price: 276.00, src_image: "../images/items/MICROODAS.png", quantity: 1},
            { id: 8, name: "AirFryer Oven Electrolux 12L (EAF90)", price: 267.00, src_image: "../images/items/AIRFRYER.png", quantity: 1},
            { id: 9, name: "Multiprocessador PMP1600P 9 Em 1  1700W Philco", price: 270.00, src_image: "../images/items/MULTIPROCESSADOR.png", quantity: 1},
            { id: 10, name: "Batedeira Planetária Oster Bowl OBAT641", price: 225.00, src_image: "../images/items/BATEDEIRA.png", quantity: 1},
            { id: 11, name: "Panela de Pressão 6,8l Antiaderente ", price: 350.00, src_image: "../images/items/PANELA_DE_PRESSAO.png", quantity: 1},
            { id: 12, name: "Conjunto de Panelas Antiaderente", price: 340.00, src_image: "../images/items/CONJUNTO_DE_PANELAS.png", quantity: 1},
            { id: 13, name: "Ferro a Vapor Arno Durilium Airglide 1520W 220V", price: 330.00, src_image: "../images/items/FERRO_DE_PASSAR.png", quantity: 1},
            { id: 14, name: "Mesa de Jantar Pequia 6 lugares", price: 292.00, src_image: "../images/items/MESA_6_LUGARES.png", quantity: 1},
            { id: 15, name: "Kit Ferramentas Maleta 178 Pçs Bosch  Mecânica", price: 234.00, src_image: "../images/items/KIT_FERRAMENTA.png", quantity: 1},
            { id: 16, name: "kit trio tapete runner Cozinha com Passadeira ", price: 240.00, src_image: "../images/items/TAPETE.png", quantity: 1},
            { id: 17, name: "Lorenzetti Acqua Duo Ultra Chuveiro ", price: 310.00, src_image: "../images/items/CHUVEIRO.png", quantity: 1},
            { id: 18, name: "Toalhas de banho 5 pç/100% Algodão", price: 280.00, src_image: "../images/items/KIT_TOALHAS.png", quantity: 1}
        ];

        function addToCard(id) {
            const product = products.find(p => p.id === id);

            let cart = JSON.parse(localStorage.getItem("cart")) || [];
            cart.push(product);

            localStorage.setItem("cart", JSON.stringify(cart));

            const totalValue = document.getElementById("totalValue");

            totalValue.classList.add("totalValue");
            totalValue.innerHTML = cart.length;
        }
        const container = document.getElementById("cardItems");
        const input = document.getElementById("searchInput");

        function handleLoadCards(list) {
            container.innerHTML = "";

            list.forEach(item => {
            container.innerHTML += `
                <div class="containerCard">
                    <img class="imgCard" src=${item.src_image} alt=${item.name}>
                    <p class="descriptionCard">${item.name}</p>
                    <p class="valueCard">R$ ${String(item.price.toFixed(2)).replace(".", ",")}</p>
                    <p class="descriptionInstallments">em até 3x de R$ ${item.price ? String((item.price / 3).toFixed(2)).replace(".", ",") : '-'}</p>
                    <button class="buttonAddCar" onclick="addToCard(${item.id})">Adicionar ao Carrinho</button>
                </div>
            `;
            });
        }
        handleLoadCards(products)

        // Função de filtro
        function filterItems(searchValue) {
            const filtered = products.filter(item =>
                item.name.toLowerCase().includes(searchValue.toLowerCase())
            );

            handleLoadCards(filtered);
        }

        // Evento ao digitar
        input.addEventListener("input", (e) => {
        filterItems(e.target.value);
        });

    </script>
</body>
</html>
